<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生日快乐，宝宝</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <link href="https://fonts.font.im/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.staticfile.net/lxgw-wenkai-screen-webfont/1.7.0/style.css" />

    <style>
        body { margin: 0; background-color: #fdfcfb; font-family: -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-handwriting { 
            font-family: "LXGW WenKai Screen", "KaiTi", "楷体", cursive; 
            letter-spacing: 2px; 
        }

        .gradient-mesh {
            background-color: #fdfcfb;
            background-image: radial-gradient(at 0% 0%, hsla(353,100%,93%,1) 0, transparent 50%), radial-gradient(at 50% 0%, hsla(225,39%,95%,1) 0, transparent 50%), radial-gradient(at 100% 0%, hsla(339,49%,91%,1) 0, transparent 50%);
            background-attachment: fixed;
        }
        .glass-card { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.4); box-shadow: 0 10px 30px rgba(244, 63, 94, 0.08); }
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(0); opacity: 0; } 10%, 90% { opacity: 1; } 100% { transform: translateY(-110vh) rotate(20deg); opacity: 0; } }
        .floating-icon { position: fixed; bottom: -10%; pointer-events: none; z-index: 0; animation: float linear infinite; }
    </style>
</head>
<body>
    <div id="root"></div>
    <audio id="bgMusic" loop preload="auto" src="./music.mp3"></audio>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [isPlaying, setIsPlaying] = useState(false);
            const [hasInteracted, setHasInteracted] = useState(false);
            const audioRef = useRef(null);

            useEffect(() => {
                audioRef.current = document.getElementById('bgMusic');
                const end = Date.now() + 5000;
                const frame = () => {
                    confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors:['#ffafbd', '#ffc3a0'] });
                    confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors:['#ffafbd', '#ffc3a0'] });
                    if (Date.now() < end) requestAnimationFrame(frame);
                };
                frame();

                const attemptPlay = () => {
                    if (audioRef.current && !isPlaying) {
                        audioRef.current.play()
                            .then(() => {
                                setIsPlaying(true);
                                setHasInteracted(true);
                            })
                            .catch(e => {
                                console.error("自动播放失败:", e);
                            });
                    }
                };

                window.addEventListener('touchstart', attemptPlay);
                window.addEventListener('click', attemptPlay);

                return () => {
                    window.removeEventListener('touchstart', attemptPlay);
                    window.removeEventListener('click', attemptPlay);
                };
            }, [isPlaying]);

            const toggleMusic = (e) => {
                e.stopPropagation(); 
                if (!audioRef.current) return;
                
                if (isPlaying) {
                    audioRef.current.pause();
                    setIsPlaying(false);
                } else {
                    audioRef.current.play()
                        .then(() => setIsPlaying(true))
                        .catch(e => {
                            alert("找不到同目录下的 music.mp3 文件。");
                        });
                }
            };

            return (
                <div className="min-h-screen gradient-mesh relative overflow-hidden">
                    {[...Array(15)].map((_, i) => (
                        <div key={i} className="floating-icon" style={{ left: `${Math.random() * 100}%`, animationDuration: `${10 + Math.random() * 10}s`, animationDelay: `${Math.random() * 5}s`, fontSize: `${15 + Math.random() * 20}px` }}>
                            {i % 2 === 0 ? '❤️' : '⭐'}
                        </div>
                    ))}
                    
                    <div className="fixed top-6 right-6 flex flex-col items-end gap-2 z-50">
                        <button onClick={toggleMusic} className="w-12 h-12 glass-card rounded-full flex items-center justify-center text-rose-500 shadow-lg text-xl">
                            {isPlaying ? '🎵' : '🔇'}
                        </button>
                        {!hasInteracted && <span className="text-[10px] text-rose-400 font-bold animate-bounce mt-1">点击开启音乐</span>}
                    </div>

                    <section className="min-h-[85vh] flex flex-col items-center justify-center p-6 text-center">
                        <div className="animate-fade-in">
                            <span className="text-[10px] uppercase tracking-[0.4em] font-bold text-rose-400 mb-6 block">Happy Birthday</span>
                            <h2 className="font-serif text-5xl md:text-8xl mb-12 leading-tight text-rose-900">愿你<br /><span className="italic text-rose-500">一切顺遂</span></h2>
                            <div className="relative inline-block transition-transform hover:scale-105 duration-500">
                                <div className="w-48 h-48 md:w-64 md:h-64 glass-card rounded-[48px] flex items-center justify-center text-rose-500 shadow-2xl relative z-10">
                                    <span style={{fontSize: '80px'}}>🎂</span>
                                </div>
                                <div className="absolute inset-0 bg-rose-200/30 blur-3xl rounded-full -z-10 animate-pulse"></div>
                            </div>
                        </div>
                        <div className="mt-20 flex flex-col items-center gap-2 opacity-30">
                            <span className="text-[10px] tracking-widest">向下滑动</span>
                            <div className="w-px h-10 bg-rose-400"></div>
                        </div>
                    </section>

                    <section className="max-w-lg mx-auto px-6 py-10">
                        <div className="glass-card rounded-[48px] p-8 md:p-14 relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-40 h-40 bg-rose-100/50 rounded-full blur-3xl -mr-20 -mt-20"></div>
                            <div className="relative z-10">
                                <div className="text-3xl mb-8">💌</div>
                                
                                <h3 className="font-handwriting font-bold text-2xl md:text-3xl mb-8 leading-relaxed text-rose-900">
                                    宝宝，今天是正月十五，元宵月圆，也是你的生日，很遗憾不能陪你一起。
                                </h3>
                                
                                <div className="space-y-6 text-gray-800 leading-loose text-xl font-handwriting">
                                    <p>回头一看，这天刚好是我们认识的第61天，也是我们一起走过的第三个月的第一天。这么多特别的日子撞在一起，好像在告诉我：你一出现，所有美好都凑齐了。</p>
                                    <p>这60天里，我开心过、心动过、也更确定我是真的很喜欢你，喜欢和你聊天的每一刻，喜欢想到你就会不自觉笑起来的感觉，喜欢我们慢慢靠近、慢慢熟悉的这段时光。</p>
                                    <p>对我来说，这是和你一起走向更久更远的新起点。我想祝你：永远被爱，永远被温柔以待，永远开开心心！</p>
                                    <p className="text-3xl font-bold text-rose-500 mt-12 mb-4">宝宝，生日快乐。</p>
                                </div>

                                <div className="mt-14 pt-10 border-t border-rose-100 flex items-center gap-5">
                                    <div className="w-14 h-14 rounded-full bg-rose-500 flex items-center justify-center text-white text-2xl shadow-lg">❤️</div>
                                    <div>
                                        <p className="font-handwriting font-bold text-rose-900 text-2xl">爱你，娟宝</p>
                                        <p className="text-sm text-rose-400 mt-1">2026年3月3日</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <footer className="py-20 text-center">
                        <div className="text-3xl mb-6">💖</div>
                        <h2 className="font-serif text-3xl mb-4 italic text-rose-900">愿你开心度过每一天！</h2>
                        <p className="text-gray-400 text-[10px] tracking-widest uppercase">Made with love for your special day</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
